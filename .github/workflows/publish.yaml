name: Publish to pub.dev

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

jobs:
  publish:
    name: Publish
    runs-on: ubuntu-latest
    permissions:
      id-token: write # Required for OIDC token exchange with pub.dev

    steps:
      - uses: actions/checkout@v4

      - uses: dart-lang/setup-dart@v1
        with:
          sdk: stable

      - name: Install dependencies
        run: dart pub get

      - name: Analyze
        run: dart analyze --fatal-infos

      - name: Run tests
        run: dart test

      - name: Publish (dry-run)
        run: dart pub publish --dry-run

      # Automated publishing to pub.dev is disabled. We publish locally with
      # `dart pub publish` for now. To re-enable:
      #   1. Enable "Automated publishing from GitHub Actions" on
      #      https://pub.dev/packages/hr_zones/admin
      #   2. Uncomment the step below.
      # - name: Publish
      #   run: dart pub publish --force
